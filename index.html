<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSPD - 罪状同期システム</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-red: #ef4444;
            --primary-blue: #3b82f6;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 900px; }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-blue);
        }

        header h1 { margin: 10px 0; font-size: 1.5rem; color: var(--primary-blue); letter-spacing: 2px; }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }

        .tab-btn {
            flex: 1; padding: 10px; border: none; background: var(--card-bg);
            color: var(--text-dim); cursor: pointer; border-radius: 6px; font-weight: bold;
        }

        .tab-btn.active { background: var(--primary-blue); color: white; }

        .crime-section {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 8px;
            margin-bottom: 30px;
        }

        .crime-section.active { display: grid; }

        .crime-card {
            background: var(--card-bg);
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid transparent;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: 0.2s;
        }

        .crime-card.selected { background: #334155; border-color: var(--accent-gold); }
        .crime-name { font-weight: bold; font-size: 0.95rem; }
        .crime-price { color: var(--accent-gold); font-weight: bold; margin-left: 10px; }

        .status-dot {
            width: 10px; height: 10px; border-radius: 50%; background: #475569;
            margin-left: 10px; flex-shrink: 0;
        }

        .selected .status-dot { background: var(--accent-gold); box-shadow: 0 0 8px var(--accent-gold); }

        /* Output Area */
        .output-container {
            background: #020617;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 150px;
        }
        
        .output-label { font-size: 0.8rem; color: var(--primary-blue); margin-bottom: 5px; display: block; }
        
        #text-output {
            width: 100%;
            background: transparent;
            color: white;
            border: none;
            font-family: monospace;
            font-size: 0.9rem;
            resize: none;
            height: 100px;
            outline: none;
        }

        .footer-result {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.98); border-top: 2px solid var(--primary-blue);
            padding: 15px; display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }

        .result-item { text-align: center; }
        .result-label { font-size: 0.75rem; color: var(--text-dim); }
        .result-value { display: block; font-size: 1.3rem; font-weight: bold; }

        #total-fine { color: var(--accent-gold); }
        #total-prison { color: var(--primary-red); }

        .btn-group { display: flex; gap: 10px; }
        .btn-copy { background: var(--primary-blue); color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-reset { background: var(--primary-red); color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        @media (max-width: 600px) { .footer-result { flex-direction: column; gap: 10px; } }
    </style>
</head>
<body>

<div class="container">
    <header><h1>LSPD TERMINAL</h1></header>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('normal')">一般罪状</button>
        <button class="tab-btn" onclick="showTab('quick')">簡易セット</button>
    </div>

    <div id="normal" class="crime-section active"></div>
    <div id="quick" class="crime-section"></div>

    <div class="output-container">
        <span class="output-label">OUTPUT TEXT (AUTO-GENERATED)</span>
        <textarea id="text-output" readonly></textarea>
    </div>
</div>

<div class="footer-result">
    <div class="result-item">
        <span class="result-label">合計罰金</span>
        <span class="result-value" id="total-fine">¥0</span>
    </div>
    <div class="result-item">
        <span class="result-label">刑期 / 場所</span>
        <span class="result-value" id="total-prison">0分 (留置場)</span>
    </div>
    <div class="btn-group">
        <button class="btn-copy" onclick="copyText()">COPY</button>
        <button class="btn-reset" onclick="resetAll()">CLEAR</button>
    </div>
</div>

<script>
const normalCrimes = [
    {id: 1, n: "銃刀法違反", p: 300000},
    {id: 2, n: "道路交通法違反", p: 300000},
    {id: 3, n: "スプレー禁止罪", p: 100000},
    {id: 4, n: "賭博罪", p: 1000000},
    {id: 5, n: "公務執行妨害", p: 300000},
    {id: 6, n: "暴行罪", p: 500000},
    {id: 7, n: "NPC殺人罪", p: 500000},
    {id: 8, n: "無免許運転罪", p: 500000},
    {id: 9, n: "窃盗罪", p: 1000000},
    {id: 10, n: "業務妨害罪", p: 1000000},
    {id: 11, n: "強盗罪", p: 1000000},
    {id: 12, n: "誘拐拉致監禁罪", p: 1500000},
    {id: 13, n: "準重強盗罪", p: 2000000},
    {id: 14, n: "プレイヤー殺人未遂罪", p: 2000000},
    {id: 15, n: "プレイヤー殺人罪", p: 3000000},
    {id: 16, n: "重強盗罪", p: 3000000},
    {id: 17, n: "重窃盗罪", p: 5000000},
    {id: 18, n: "逃走補助罪", p: 5000000},
    {id: 19, n: "薬物所持(1-30)", p: 1500000},
    {id: 20, n: "薬物所持(31-50)", p: 3000000},
    {id: 21, n: "薬物所持(51-)", p: 5000000},
    {id: 22, n: "汚職収賄罪", p: 500000000},
    {id: 23, n: "脅迫罪", p: 10000000},
    {id: 24, n: "詐欺罪", p: 20000000},
    {id: 25, n: "テロ罪", p: 50000000},
    {id: 26, n:  "イベントテロ罪", p: 100000000}
];

const quickCrimes = [
    {id: 101, n: "店舗強盗 セット", p: 3400000, sub: [1, 2, 5, 6, 7, 10, 11]},
    {id: 102, n: "銀行強盗 セット", p: 3900000, sub: [1, 2, 5, 10, 13]},
    {id: 103, n: "宝石本店 セット", p: 3900000, sub: [1, 2, 5, 10, 13]},
    {id: 104, n: "ボブキャット セット", p: 4400000, sub: [1, 2, 5, 7, 10, 13]},
    {id: 105, n: "豪華客船 セット", p: 5400000, sub: [1, 2, 5, 7, 10, 16]},
    {id: 106, n: "高級車強盗 セット", p: 5400000, sub: [1, 2, 5, 7, 10, 16]}
];

let selectedIds = new Set();

function render() {
    const normalBox = document.getElementById('normal');
    const quickBox = document.getElementById('quick');

    const createCard = (crime, isQuick = false) => {
        const div = document.createElement('div');
        const isSelected = selectedIds.has(crime.id);
        div.className = `crime-card ${isSelected ? 'selected' : ''}`;
        div.onclick = () => isQuick ? toggleQuick(crime) : toggleNormal(crime.id);
        div.innerHTML = `
            <span class="crime-name">${crime.n}</span>
            <div style="display:flex; align-items:center;">
                <span class="crime-price">¥${(crime.p / 10000).toLocaleString()}万</span>
                <div class="status-dot"></div>
            </div>
        `;
        return div;
    };

    normalBox.innerHTML = '';
    normalCrimes.forEach(c => normalBox.appendChild(createCard(c)));
    quickBox.innerHTML = '';
    quickCrimes.forEach(c => quickBox.appendChild(createCard(c, true)));
    
    updateCalculation();
}

function toggleQuick(quickCrime) {
    const isSelected = selectedIds.has(quickCrime.id);
    if (isSelected) {
        selectedIds.delete(quickCrime.id);
        quickCrime.sub.forEach(subId => selectedIds.delete(subId));
    } else {
        selectedIds.add(quickCrime.id);
        quickCrime.sub.forEach(subId => selectedIds.add(subId));
    }
    render();
}

function toggleNormal(id) {
    if (selectedIds.has(id)) {
        selectedIds.delete(id);
        quickCrimes.forEach(q => {
            if (q.sub.includes(id)) selectedIds.delete(q.id);
        });
    } else {
        selectedIds.add(id);
    }
    render();
}

function showTab(type) {
    document.querySelectorAll('.tab-btn, .crime-section').forEach(el => el.classList.remove('active'));
    if (type === 'normal') {
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        document.getElementById('normal').classList.add('active');
    } else {
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        document.getElementById('quick').classList.add('active');
    }
}

function updateCalculation() {
    let total = 0;
    let selectedNames = [];

    // 一般罪状の集計
    normalCrimes.forEach(c => {
        if (selectedIds.has(c.id)) {
            total += c.p;
            selectedNames.push(c.n);
        }
    });

    // 表示更新
    document.getElementById('total-fine').innerText = `¥${total.toLocaleString()}`;
    let prisonTime = 0;
    let location = "留置場";
    if (total > 3000000) {
        location = "プリズン";
        prisonTime = Math.floor(total / 1000000) * 5;
    }
    document.getElementById('total-prison').innerText = `${prisonTime}分 (${location})`;

    // テキスト出力生成
    const crimeStr = selectedNames.length > 0 ? selectedNames.join('、') : "なし";
    const totalMan = total / 10000;
    
    // 出力フォーマット
    const outputText = `罪状：${crimeStr}\n押収物：\n罰金額：${totalMan}万\nプリズン時間：${prisonTime}分\nその他：`;
    document.getElementById('text-output').value = outputText;
}

function copyText() {
    const textarea = document.getElementById('text-output');
    textarea.select();
    document.execCommand('copy');
    alert("テキストをコピーしました！");
}

function resetAll() {
    selectedIds.clear();
    render();
}

render();
</script>

</body>
</html>
